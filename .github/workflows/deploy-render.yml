name: Deploy to Render

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect PG and set connection
        run: |
          KEY="${{ secrets.RENDER_API_KEY }}"
          AUTH="Authorization: Bearer $KEY"
          BASE="https://api.render.com/v1"
          PG_ID="dpg-d8nf51nlk1mc739m3g90-a"
          SVC_ID="srv-d8mtljrbc2fs73ecqcug"
          
          echo "=== Full PG object ==="
          PG_INFO=$(curl -s -H "$AUTH" "$BASE/postgres/$PG_ID")
          echo "$PG_INFO" | python3 -m json.tool
          
          echo "=== Get connection info via different endpoints ==="
          curl -s -w "\nHTTP %{http_code}" -H "$AUTH" "$BASE/postgres/$PG_ID/connection-info"
          echo ""
          curl -s -w "\nHTTP %{http_code}" -H "$AUTH" "$BASE/databases/$PG_ID/connection-info"
