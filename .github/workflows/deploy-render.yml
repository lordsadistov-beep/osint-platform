name: Deploy to Render

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Create Rendr services via API
        run: |
          KEY="${{ secrets.RENDER_API_KEY }}"
          AUTH="Authorization: Bearer $KEY"
          CT="Content-Type: application/json"
          
          echo "=== List existing services ==="
          curl -s -w "\nHTTP %{http_code}" -H "$AUTH" https://api.render.com/v1/services
          echo ""
          
          echo "=== List owners ==="
          curl -s -w "\nHTTP %{http_code}" -H "$AUTH" https://api.render.com/v1/owners
