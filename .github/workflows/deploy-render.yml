name: Deploy to Render

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Full deploy
        run: |
          KEY="${{ secrets.RENDER_API_KEY }}"
          AUTH="Authorization: Bearer $KEY"
          CT="Content-Type: application/json"
          BASE="https://api.render.com/v1"
          SVC_ID="srv-d8mtljrbc2fs73ecqcug"
          OID="tea-d8msahu7r5hc73a5cdmg"
          
          echo "=== 1. Fix web service config ==="
          curl -s -w "\nHTTP %{http_code}" -X PATCH -H "$AUTH" -H "$CT" \
            -d "{\"serviceDetails\":{\"envSpecificDetails\":{\"startCommand\":\"cd backend && uvicorn app.main:app --host 0.0.0.0 --port \$PORT\"},\"healthCheckPath\":\"/health\"}}" \
            "$BASE/services/$SVC_ID"
          echo ""
          
          echo "=== 2. Create PostgreSQL ==="
          curl -s -w "\nHTTP %{http_code}" -X POST -H "$AUTH" -H "$CT" \
            -d "{\"name\":\"osint-db\",\"ownerId\":\"$OID\",\"plan\":\"free\",\"region\":\"frankfurt\",\"databaseName\":\"osint_platform\",\"user\":\"osint\",\"version\":\"16\"}" \
            "$BASE/postgres"
          echo ""
          
          echo "=== 3. Create static site (via /v1/services) ==="
          curl -s -w "\nHTTP %{http_code}" -X POST -H "$AUTH" -H "$CT" \
            -d "{\"type\":\"static_site\",\"name\":\"osint-platform-frontend\",\"ownerId\":\"$OID\",\"repo\":\"https://github.com/lordsadistov-beep/osint-platform\",\"branch\":\"master\",\"buildCommand\":\"npm install && npm run build\",\"publishPath\":\"dist\",\"plan\":\"free\",\"region\":\"frankfurt\",\"rootDir\":\"frontend\"}" \
            "$BASE/services"
