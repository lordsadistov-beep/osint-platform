name: Deploy to Render

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check service status with verbose curl
        run: |
          KEY="${{ secrets.RENDER_API_KEY }}"
          echo "=== Key length ==="
          echo ${#KEY}
          echo "=== Get service (verbose) ==="
          curl -s -H "Authorization: Bearer $KEY" \
            "https://api.render.com/v1/services/srv-d8mtljrbc2fs73ecqcug" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          print('suspended:', d.get('suspended'))
          print('suspenders:', d.get('suspenders'))
          print('createdAt:', d.get('createdAt'))
          sd=d.get('serviceDetails',{})
          print('healthCheckPath:', sd.get('healthCheckPath'))
          "
          echo "=== Deploy create verbose ==="
          curl -v -X POST -H "Authorization: Bearer $KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}' \
            "https://api.render.com/v1/services/srv-d8mtljrbc2fs73ecqcug/deploys" 2>&1
