name: Deploy to Render

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Debug env vars
        run: |
          KEY="${{ secrets.RENDER_API_KEY }}"
          AUTH="Authorization: Bearer $KEY"
          BASE="https://api.render.com/v1"
          SVC_ID="srv-d8mtljrbc2fs73ecqcug"
          
          echo "=== Raw env-vars response ==="
          curl -v -H "$AUTH" "$BASE/services/$SVC_ID/env-vars" 2>&1

          echo ""
          echo "=== Check service envSpecificDetails ==="
          curl -s -H "$AUTH" "$BASE/services/$SVC_ID" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          esd=d['serviceDetails'].get('envSpecificDetails',{})
          for k,v in esd.items():
              print(f'  {k}: {v}')
          "
