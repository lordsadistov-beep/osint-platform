name: Deploy to Render

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Create new web service with correct API format
        run: |
          KEY="${{ secrets.RENDER_API_KEY }}"
          AUTH="Authorization: Bearer $KEY"
          CT="Content-Type: application/json"
          BASE="https://api.render.com/v1"

          echo "=== Create web service ==="
          RESP=$(curl -s -w "\n%{http_code}" -X POST -H "$AUTH" -H "$CT" \
            -d '{
              "type": "web_service",
              "name": "osint-platform-api",
              "env": "python",
              "plan": "free",
              "region": "oregon",
              "buildCommand": "pip install -r requirements.txt",
              "startCommand": "uvicorn app.main:app --host 0.0.0.0 --port $PORT",
              "healthCheckPath": "/health",
              "repo": "https://github.com/lordsadistov-beep/osint-platform",
              "autoDeploy": "yes",
              "branch": "master",
              "rootDir": "backend"
            }' \
            "$BASE/services" 2>/dev/null)
          HTTP_CODE=$(echo "$RESP" | tail -1)
          BODY=$(echo "$RESP" | head -n -1)
          echo "HTTP: $HTTP_CODE"
          echo "Body: $BODY"
