name: Deploy to Render

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Get owner and create service
        run: |
          KEY="${{ secrets.RENDER_API_KEY }}"
          AUTH="Authorization: Bearer $KEY"
          CT="Content-Type: application/json"
          BASE="https://api.render.com/v1"
          FE_SVC="srv-d8nf52btqb8s73d4cgeg"

          echo "=== Get user info ==="
          curl -s -H "$AUTH" "$BASE/user" | python3 -c "
import sys,json
d=json.load(sys.stdin)
print(json.dumps(d, indent=2))
"

          echo ""
          echo "=== Get static site info for ownerID ==="
          curl -s -H "$AUTH" "$BASE/services/$FE_SVC" | python3 -c "
import sys,json
d=json.load(sys.stdin)
print('ownerID:', d.get('ownerId','?'))
print('userID in serviceDetails:', d.get('serviceDetails',{}).get('ownerId','?'))
"

          echo ""
          echo "=== List owners ==="
          curl -s -H "$AUTH" "$BASE/owners" | python3 -c "
import sys,json
d=json.load(sys.stdin)
if isinstance(d, list):
    for o in d:
        print(f'  ID={o.get(\"id\")} name={o.get(\"name\")} type={o.get(\"type\")}')
else:
    print(json.dumps(d, indent=2))
"
