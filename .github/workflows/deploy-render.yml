name: Deploy to Render

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Restore and deploy with wait
        run: |
          KEY="${{ secrets.RENDER_API_KEY }}"
          AUTH="Authorization: Bearer $KEY"
          CT="Content-Type: application/json"
          BASE="https://api.render.com/v1"
          SVC_ID="srv-d8mtljrbc2fs73ecqcug"
          PG_ID="dpg-d8nf51nlk1mc739m3g90-a"

          echo "=== Restore env + startCommand ==="
          CONN_INFO=$(curl -s -H "$AUTH" "$BASE/postgres/$PG_ID/connection-info")
          PG_PASS=$(echo "$CONN_INFO" | python3 -c "import sys,json; print(json.load(sys.stdin)['password'])")
          DATABASE_URL="postgresql+asyncpg://osint_platform_y27c_user:${PG_PASS}@dpg-d8nf51nlk1mc739m3g90-a:5432/osint_platform_y27c"
          curl -s -X PATCH -H "$AUTH" -H "$CT" \
            -d "{\"serviceDetails\":{\"envSpecificDetails\":{\"buildCommand\":\"pip install -r requirements.txt\",\"startCommand\":\"uvicorn app.main:app --host 0.0.0.0 --port \$PORT\"}},\"envVars\":[{\"key\":\"DATABASE_URL\",\"value\":\"${DATABASE_URL}\"},{\"key\":\"FRONTEND_URL\",\"value\":\"https://osint-platform-frontend.onrender.com\"},{\"key\":\"CORS_ORIGINS\",\"value\":\"[\\\"https://osint-platform-frontend.onrender.com\\\"]\"}]}" \
            "$BASE/services/$SVC_ID" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          esd=d['serviceDetails']['envSpecificDetails']
          print('build:', esd.get('buildCommand'))
          print('start:', esd.get('startCommand'))
          "

          echo "=== Deploy ==="
          curl -s -X POST -H "$AUTH" -H "$CT" \
            -d '{"clearCache":"do_not_clear"}' \
            "$BASE/services/$SVC_ID/deploys" > /tmp/deploy_resp.txt
          cat /tmp/deploy_resp.txt | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          print('Deploy ID:', d.get('id',''))
          print('Status:', d.get('status',''))
          " 2>/dev/null || echo "Deploy accepted (202)"

          echo "Waiting 5 min..."
          sleep 300
          echo "=== Health check ==="
          curl -s --max-time 10 "https://osint-platform-w0n6.onrender.com/health" || echo "(unreachable)"
