name: Deploy to Render

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Sync Render Blueprint
        run: |
          KEY="${{ secrets.RENDER_API_KEY }}"
          AUTH="Authorization: Bearer $KEY"
          echo "=== POST /v1/blueprints ==="
          curl -s -w "\nHTTP %{http_code}" -X POST -H "$AUTH" -H "Content-Type: application/json" -d '{}' https://api.render.com/v1/blueprints
          echo ""
          echo "=== GET /v1/blueprints ==="
          curl -s -w "\nHTTP %{http_code}" -X GET -H "$AUTH" https://api.render.com/v1/blueprints
