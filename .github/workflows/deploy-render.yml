name: Deploy to Render

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Get service details
        run: |
          KEY="${{ secrets.RENDER_API_KEY }}"
          AUTH="Authorization: Bearer $KEY"
          BASE="https://api.render.com/v1"
          SVC_ID="srv-d8mtljrbc2fs73ecqcug"

          echo "=== Full service details ==="
          curl -s -H "$AUTH" "$BASE/services/$SVC_ID" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          sd = d.get('serviceDetails', {})
          print('name:', d.get('name'))
          print('env:', sd.get('env'))
          print('runtime:', sd.get('runtime'))
          esd = sd.get('envSpecificDetails', {})
          for k,v in esd.items():
              print(f'  {k}: {v}')
          "

          echo ""
          echo "=== Check latest deploys ==="
          curl -s -H "$AUTH" "$BASE/services/$SVC_ID/deploys?limit=3" | python3 -c "
          import sys, json
          deploys = json.load(sys.stdin)
          for d in deploys:
              c = d.get('commit',{})
              print(f\"{d['id']}: status={d.get('status')} trigger={d.get('trigger')} msg='{c.get('message','')}' finished={d.get('finishedAt','N/A')}\")
          "
