name: Deploy to Render

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Probe Render API
        run: |
          API_KEY="${{ secrets.RENDER_API_KEY }}"
          AUTH="Authorization: Bearer $API_KEY"
          echo "=== Testing Render API endpoints ==="
          for path in /v1/blueprint /v1/blueprints /v1/blueprint/sync /v1/blueprints/sync /v1/services /v1/owner; do
            code=$(curl -s -o /tmp/resp.json -w "%{http_code}" -H "$AUTH" "https://api.render.com$path")
            echo "$path -> HTTP $code"
            if [ "$code" != "000" ]; then
              echo "  Body: $(head -c 200 /tmp/resp.json)"
            fi
          done
