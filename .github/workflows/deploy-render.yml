name: Deploy to Render

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Create fresh web service and test
        run: |
          KEY="${{ secrets.RENDER_API_KEY }}"
          AUTH="Authorization: Bearer $KEY"
          CT="Content-Type: application/json"
          BASE="https://api.render.com/v1"
          OLD_SVC="srv-d8mtljrbc2fs73ecqcug"

          echo "=== Delete old service ==="
          curl -s -X DELETE -H "$AUTH" "$BASE/services/$OLD_SVC" && echo "Deleted"
          sleep 5

          echo "=== Create new web service ==="
          RESULT=$(curl -s -X POST -H "$AUTH" -H "$CT" \
            -d '{
              "type": "web_service",
              "name": "osint-platform-api",
              "env": "python",
              "plan": "free",
              "region": "oregon",
              "buildCommand": "pip install -r requirements.txt",
              "startCommand": "uvicorn app.main:app --host 0.0.0.0 --port $PORT",
              "healthCheckPath": "/health",
              "repo": "https://github.com/lordsadistov-beep/osint-platform",
              "autoDeploy": "yes",
              "branch": "master",
              "rootDir": "backend"
            }' \
            "$BASE/services")
          echo "$RESULT" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          print('New service ID:', d.get('id','?'))
          print('Name:', d.get('name'))
          print('Status:', d.get('status','?'))
          "
