name: Deploy to Render

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup environment
        run: |
          KEY="${{ secrets.RENDER_API_KEY }}"
          AUTH="Authorization: Bearer $KEY"
          CT="Content-Type: application/json"
          BASE="https://api.render.com/v1"
          
          echo "AUTH=$AUTH" >> $GITHUB_ENV
          echo "CT=$CT" >> $GITHUB_ENV
          echo "BASE=$BASE" >> $GITHUB_ENV
          echo "KEY=$KEY" >> $GITHUB_ENV
      
      - name: Get owner and existing services
        id: info
        run: |
          echo "=== Owners ==="
          OWNERS=$(curl -s -H "$AUTH" "$BASE/owners")
          echo "$OWNERS"
          echo "OWNERS=$OWNERS" >> $GITHUB_ENV
          
          echo "=== Existing services ==="
          SERVICES=$(curl -s -H "$AUTH" "$BASE/services")
          echo "$SERVICES"
          echo "SERVICES=$SERVICES" >> $GITHUB_ENV
          
          echo "=== Existing static sites ==="
          STATIC=$(curl -s -H "$AUTH" "$BASE/static-sites")
          echo "$STATIC"
          echo "STATIC=$STATIC" >> $GITHUB_ENV
