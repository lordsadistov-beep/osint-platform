name: Deploy to Render

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Connect PG and trigger deploy
        run: |
          KEY="${{ secrets.RENDER_API_KEY }}"
          AUTH="Authorization: Bearer $KEY"
          CT="Content-Type: application/json"
          BASE="https://api.render.com/v1"
          SVC_ID="srv-d8mtljrbc2fs73ecqcug"
          PG_ID="dpg-d8nf51nlk1mc739m3g90-a"
          
          CONN_INFO=$(curl -s -H "$AUTH" "$BASE/postgres/$PG_ID/connection-info")
          PG_PASS=$(echo "$CONN_INFO" | python3 -c "import sys,json; print(json.load(sys.stdin)['password'])")
          DATABASE_URL="postgresql+asyncpg://osint_platform_y27c_user:${PG_PASS}@dpg-d8nf51nlk1mc739m3g90-a:5432/osint_platform_y27c"
          
          curl -s -X PATCH -H "$AUTH" -H "$CT" \
            -d "{\"envVars\":[{\"key\":\"DATABASE_URL\",\"value\":\"${DATABASE_URL}\"},{\"key\":\"FRONTEND_URL\",\"value\":\"https://osint-platform-frontend.onrender.com\"},{\"key\":\"CORS_ORIGINS\",\"value\":\"[\\\"https://osint-platform-frontend.onrender.com\\\"]\"}]}" \
            "$BASE/services/$SVC_ID"
          curl -s -X POST -H "$AUTH" -H "$CT" \
            -d '{"clearCache":"do_not_clear"}' \
            "$BASE/services/$SVC_ID/deploys"

  status:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Check deploy result
        run: |
          KEY="${{ secrets.RENDER_API_KEY }}"
          AUTH="Authorization: Bearer $KEY"
          SVC_ID="srv-d8mtljrbc2fs73ecqcug"
          echo "=== Last deploy status ==="
          DEPLOY=$(curl -s --max-time 30 -H "$AUTH" "https://api.render.com/v1/services/$SVC_ID/deploys?limit=1")
          echo "$DEPLOY" | python3 -c "
import sys, json
d = json.load(sys.stdin)
dep = d[0]
print('Status:', dep.get('status'))
if dep.get('status') == 'live':
    print('SUCCESS - service is live')
elif dep.get('status') == 'build_failed':
    print('FAILED - build error')
    print('Logs:', dep.get('buildLogs','N/A'))
else:
    print('State:', dep.get('status'))
"
          echo ""
          echo "=== Backend /health ==="
          curl -s --max-time 15 -w "\nHTTP %{http_code}" "https://osint-platform-w0n6.onrender.com/health" || echo "(unreachable)"
          echo ""
          echo "=== Frontend ==="
          curl -s --max-time 15 -w "\nHTTP %{http_code}" "https://osint-platform-frontend.onrender.com" || echo "(unreachable)"
