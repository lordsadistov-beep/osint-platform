name: Deploy to Render

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check latest deploy status
        run: |
          KEY="${{ secrets.RENDER_API_KEY }}"
          AUTH="Authorization: Bearer $KEY"
          CT="Content-Type: application/json"
          BASE="https://api.render.com/v1"
          SVC_ID="srv-d8mtljrbc2fs73ecqcug"
          PG_ID="dpg-d8nf51nlk1mc739m3g90-a"

          CONN_INFO=$(curl -s -H "$AUTH" "$BASE/postgres/$PG_ID/connection-info")
          PG_PASS=$(echo "$CONN_INFO" | python3 -c "import sys,json; print(json.load(sys.stdin)['password'])")
          DATABASE_URL="postgresql+asyncpg://osint_platform_y27c_user:${PG_PASS}@dpg-d8nf51nlk1mc739m3g90-a:5432/osint_platform_y27c"

          curl -s -X PATCH -H "$AUTH" -H "$CT" \
            -d "{\"envVars\":[{\"key\":\"DATABASE_URL\",\"value\":\"${DATABASE_URL}\"},{\"key\":\"FRONTEND_URL\",\"value\":\"https://osint-platform-frontend.onrender.com\"},{\"key\":\"CORS_ORIGINS\",\"value\":\"[\\\"https://osint-platform-frontend.onrender.com\\\"]\"}]}" \
            "$BASE/services/$SVC_ID" > /dev/null

          curl -s -X POST -H "$AUTH" -H "$CT" \
            -d '{"clearCache":"do_not_clear"}' \
            "$BASE/services/$SVC_ID/deploys" > /dev/null

          echo "Waiting 5 min..."
          sleep 300

          echo "=== Latest deploy ==="
          curl -s -H "$AUTH" "$BASE/services/$SVC_ID/deploys?limit=2" | python3 -c "
          import sys, json
          raw = json.loads(sys.stdin.read())
          items = raw if isinstance(raw, list) else raw.get('deploys', [raw])
          for d in items[:2]:
              c = d.get('commit',{})
              print(f\"{d.get('id','?')}: status={d.get('status')} msg='{c.get('message','')[:50]}' finished={d.get('finishedAt','N/A')}\")
          "

          echo "=== Health ==="
          curl -s --max-time 10 "https://osint-platform-w0n6.onrender.com/health" || echo "(unreachable)"
          echo ""
          echo "=== Frontend ==="
          curl -s --max-time 10 "https://osint-platform-frontend.onrender.com" || echo "(unreachable)"
