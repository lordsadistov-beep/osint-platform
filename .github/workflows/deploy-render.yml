name: Deploy to Render

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Debug deploy
        run: |
          KEY="${{ secrets.RENDER_API_KEY }}"
          AUTH="Authorization: Bearer $KEY"
          CT="Content-Type: application/json"
          BASE="https://api.render.com/v1"
          SVC_ID="srv-d8mtljrbc2fs73ecqcug"

          echo "=== Restore buildCommand ==="
          curl -s -X PATCH -H "$AUTH" -H "$CT" \
            -d '{"serviceDetails":{"envSpecificDetails":{"buildCommand":"pip install -r requirements.txt","startCommand":"python test_server.py"}}}' \
            "$BASE/services/$SVC_ID" > /tmp/patch.json
          python3 -c "import json; d=json.load(open('/tmp/patch.json')); esd=d['serviceDetails']['envSpecificDetails']; print('build:', esd['buildCommand']); print('start:', esd['startCommand'])"

          echo "=== Try deploy ==="
          RESP=$(curl -s -X POST -H "$AUTH" -H "$CT" \
            -d '{"clearCache":"do_not_clear"}' \
            "$BASE/services/$SVC_ID/deploys" 2>/dev/null)
          echo "Raw response: $RESP"
          echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print('ID:', d.get('id','?')); print('Status:', d.get('status','?'))" 2>/dev/null || echo "JSON parse failed"
