name: Deploy to Render

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check build failure
        run: |
          KEY="${{ secrets.RENDER_API_KEY }}"
          AUTH="Authorization: Bearer $KEY"
          BASE="https://api.render.com/v1"
          SVC_ID="srv-d8mtljrbc2fs73ecqcug"
          
          echo "=== Failed deploy details ==="
          curl -s -H "$AUTH" "$BASE/services/$SVC_ID/deploys/dep-d8nfkhhkh4rs73f6au80" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print('Status:', d.get('status'))
          print('Finished:', d.get('finishedAt','N/A'))
          print('Trigger:', d.get('trigger','N/A'))
          bl = d.get('buildLogs')
          if bl:
              print('--- Build logs (last 2000 chars) ---')
              print(bl[-2000:])
          else:
              print('No build logs in response')
              print('Keys:', list(d.keys()))
          "
