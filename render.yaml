databases:
  - name: osint-db
    databaseName: osint_platform
    user: osint
    plan: free
    region: frankfurt

services:
  - type: web
    name: osint-platform-api
    env: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: osint-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://osint-platform-frontend.onrender.com
      - key: CORS_ORIGINS
        value: '["https://osint-platform-frontend.onrender.com"]'

staticSites:
  - name: osint-platform-frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    buildFilter:
      paths:
        - frontend/**
    envVars:
      - key: VITE_API_URL
        value: https://osint-platform-api.onrender.com
