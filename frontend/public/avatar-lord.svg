<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="98" fill="url(#bg)" stroke="url(#accent)" stroke-width="2"/>

  <!-- Inner glow -->
  <circle cx="100" cy="100" r="85" fill="url(#glow)"/>

  <!-- Matrix-like scanning lines -->
  <g opacity="0.08">
    <line x1="20" y1="40" x2="180" y2="40" stroke="#38bdf8" stroke-width="0.5"/>
    <line x1="20" y1="60" x2="180" y2="60" stroke="#38bdf8" stroke-width="0.5"/>
    <line x1="20" y1="80" x2="180" y2="80" stroke="#38bdf8" stroke-width="0.5"/>
    <line x1="20" y1="100" x2="180" y2="100" stroke="#38bdf8" stroke-width="0.5"/>
    <line x1="20" y1="120" x2="180" y2="120" stroke="#38bdf8" stroke-width="0.5"/>
    <line x1="20" y1="140" x2="180" y2="140" stroke="#38bdf8" stroke-width="0.5"/>
    <line x1="20" y1="160" x2="180" y2="160" stroke="#38bdf8" stroke-width="0.5"/>
  </g>

  <!-- Radar arc -->
  <path d="M 100 100 L 100 30 A 70 70 0 0 1 170 100" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.3"/>
  <path d="M 100 100 L 100 40 A 60 60 0 0 1 160 100" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.2"/>

  <!-- Crosshair -->
  <circle cx="100" cy="100" r="45" fill="none" stroke="#38bdf8" stroke-width="0.8" opacity="0.3"/>
  <circle cx="100" cy="100" r="2" fill="#38bdf8"/>
  <line x1="100" y1="50" x2="100" y2="55" stroke="#38bdf8" stroke-width="1" opacity="0.4"/>
  <line x1="100" y1="145" x2="100" y2="150" stroke="#38bdf8" stroke-width="1" opacity="0.4"/>
  <line x1="50" y1="100" x2="55" y2="100" stroke="#38bdf8" stroke-width="1" opacity="0.4"/>
  <line x1="145" y1="100" x2="150" y2="100" stroke="#38bdf8" stroke-width="1" opacity="0.4"/>

  <!-- Text "Lord" -->
  <text x="100" y="112" text-anchor="middle" dominant-baseline="middle"
        font-family="monospace, 'Courier New', Courier"
        font-size="36" font-weight="bold" fill="url(#accent)"
        letter-spacing="3">
    Lord
  </text>

  <!-- Subtitle -->
  <text x="100" y="152" text-anchor="middle"
        font-family="monospace, 'Courier New', Courier"
        font-size="9" fill="#64748b" letter-spacing="4">
    OSINT
  </text>

  <!-- Decorative corner brackets -->
  <path d="M 35 50 L 35 35 L 50 35" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.4"/>
  <path d="M 165 50 L 165 35 L 150 35" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.4"/>
  <path d="M 35 150 L 35 165 L 50 165" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.4"/>
  <path d="M 165 150 L 165 165 L 150 165" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.4"/>

  <!-- Pulsing dots -->
  <circle cx="55" cy="55" r="2" fill="#38bdf8" opacity="0.6"/>
  <circle cx="145" cy="55" r="1.5" fill="#818cf8" opacity="0.4"/>
  <circle cx="55" cy="145" r="1.5" fill="#38bdf8" opacity="0.4"/>
  <circle cx="145" cy="145" r="2" fill="#818cf8" opacity="0.6"/>
</svg>
